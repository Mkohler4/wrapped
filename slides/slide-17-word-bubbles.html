<!-- Slide 17: Your Vocabulary Universe - Redesigned -->
<div class="slide" id="slide17">
  <!-- Animated background with floating particles -->
  <div class="vocab-bg">
    <div class="vocab-bg-particles" id="vocabParticles"></div>
    <div class="vocab-bg-glow"></div>
  </div>
  
  <div class="vocab-content">
    <!-- Headline matching slide-01/02/08 pattern -->
    <div class="vocab-headline">
      <span class="vocab-icon">💬</span>
      <span class="vocab-title">Your Vocabulary Universe</span>
    </div>
    <div class="vocab-subtitle">The words that define your conversations</div>
    
    <!-- Hero word - the #1 most used -->
    <div class="vocab-hero" id="vocabHero">
      <div class="vocab-hero-glow"></div>
      <div class="vocab-hero-badge">#1 WORD</div>
      <div class="vocab-hero-word" id="vocabHeroWord">--</div>
      <div class="vocab-hero-count">
        <span class="vocab-hero-number" id="vocabHeroCount" data-target="0">0</span>
        <span class="vocab-hero-label">times used</span>
      </div>
    </div>
    
    <!-- Word bubbles container -->
    <div class="word-bubbles-wrapper">
      <div class="word-bubbles-container" id="wordBubblesContainer">
        <!-- Filled by JS -->
      </div>
    </div>
    
    <!-- Stats footer -->
    <div class="vocab-stats">
      <div class="vocab-stat">
        <span class="vocab-stat-value" id="vocabTotalWords" data-target="0">0</span>
        <span class="vocab-stat-label">unique words</span>
      </div>
      <div class="vocab-stat-divider"></div>
      <div class="vocab-stat">
        <span class="vocab-stat-value" id="vocabAvgLength" data-target="0">0</span>
        <span class="vocab-stat-label">avg word length</span>
      </div>
    </div>
    
    <!-- Hint text -->
    <div class="vocab-hint">
      <span>Bigger bubble = more frequent</span>
      <span class="vocab-hint-dot">•</span>
      <span>Your words, not ChatGPT's</span>
    </div>
  </div>
</div>
