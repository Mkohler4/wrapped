<!-- Slide 1: Total Conversations - Opening Impact -->
<div class="slide active" id="slide1">
  <!-- Floating conversation bubbles background -->
  <div class="convo-bubbles-bg" id="convoBubblesBg">
    <!-- Generated by JS -->
  </div>
  
  <div class="convo-content">
    <div class="slide-label">This year, you had</div>
    
    <!-- Main number with count-up animation -->

    <div class="convo-label">conversations</div>

    <!-- Visual indicator -->
    <div class="convo-visual">
      <div class="convo-bar">
