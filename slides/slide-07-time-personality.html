<!-- Slide 7: When You Think - Temporal Activity Patterns -->
<div class="slide" id="slide7">
  <!-- Animated time particles background -->
  <div class="time-particles-bg" id="timeParticlesBg">
    <!-- Generated by JS -->
  </div>
  
  <div class="time-content">
    <div class="slide-label">Your brain lights up at</div>
    
    <!-- Hero: Peak Hour with dramatic reveal -->
    <div class="time-hero">
      <div class="time-hero-hour" id="peakHourHero">
        <span class="time-hero-number" id="peakHourNum">--</span>
        <span class="time-hero-period" id="peakHourPeriod">--</span>
      </div>
      <div class="time-hero-glow"></div>
    </div>
    
    <div class="time-hero-context">
      <span class="time-hero-count" id="peakHourCount">0</span>
      <span class="time-hero-label">messages at this hour</span>
    </div>
    
    <!-- 24-Hour Clock Wheel -->
    <div class="time-wheel-container">
      <div class="time-wheel">
        <svg class="time-wheel-svg" viewBox="0 0 100 100" id="timeWheelSvg">
          <!-- Segments filled by JS -->
        </svg>
        <div class="time-wheel-center">
          <div class="time-wheel-icon" id="timeWheelIcon">🌙</div>
        </div>
      </div>
      <!-- Hover tooltip -->
      <div class="time-wheel-tooltip" id="timeWheelTooltip">
        <div class="tooltip-hour" id="tooltipHour">8pm</div>
        <div class="tooltip-count" id="tooltipCount">1,090 messages</div>
      </div>
    </div>
    
    <!-- Day vs Night comparison -->
    <div class="time-breakdown">
      <div class="time-party time-party-day">
        <div class="time-party-icon">☀️</div>
        <div class="time-party-details">
          <div class="time-party-value" id="dayMsgCount">0</div>
          <div class="time-party-label">Day hours</div>
          <div class="time-party-range">6am - 6pm</div>
        </div>
        <div class="time-party-bar">
          <div class="time-party-bar-fill day-fill" id="dayMsgBar"></div>
        </div>
      </div>
      
      <div class="time-vs-icon">
        <span>vs</span>
      </div>
      
      <div class="time-party time-party-night">
        <div class="time-party-icon">🌙</div>
        <div class="time-party-details">
          <div class="time-party-value" id="nightMsgCount">0</div>
          <div class="time-party-label">Night hours</div>
          <div class="time-party-range">6pm - 6am</div>
        </div>
        <div class="time-party-bar">
          <div class="time-party-bar-fill night-fill" id="nightMsgBar"></div>
        </div>
      </div>
    </div>
    
    <!-- Time Signature Badge -->
    <div class="time-signature" id="timeSignature">
      <span class="time-sig-icon" id="timeSigIcon">🌙</span>
      <span class="time-sig-text" id="timeSigText">Night Owl</span>
    </div>
  </div>
</div>
