<!-- Slide 2: Total Messages - The Exchange -->
<div class="slide" id="slide2">
  <!-- Animated message stream background -->
  <div class="msg-stream-bg" id="msgStreamBg">
    <!-- Generated by JS -->
  </div>
  
  <div class="msg-content">
    <div class="slide-label">That's over</div>
    
    <!-- Main number with count-up -->
    <div class="msg-number-container">
      <div class="msg-number" id="totalMessages" data-target="15052">0</div>
      <div class="msg-number-glow"></div>
    </div>
    
    <div class="msg-label">messages</div>
    <div class="msg-sublabel">exchanged with ChatGPT</div>
    
    <!-- Message breakdown: You vs ChatGPT -->
    <div class="msg-breakdown">
      <div class="msg-party msg-party-user">
        <div class="msg-party-icon">👤</div>
        <div class="msg-party-details">
          <div class="msg-party-value" id="userMsgCount">0</div>
          <div class="msg-party-label">Your messages</div>
        </div>
        <div class="msg-party-bar">
          <div class="msg-party-bar-fill user-fill" id="userMsgBar"></div>
        </div>
      </div>
      
      <div class="msg-exchange-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M7 10L12 5L17 10M17 14L12 19L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      
      <div class="msg-party msg-party-ai">
        <div class="msg-party-icon">🤖</div>
        <div class="msg-party-details">
          <div class="msg-party-value" id="aiMsgCount">0</div>
          <div class="msg-party-label">ChatGPT replies</div>
        </div>
        <div class="msg-party-bar">
          <div class="msg-party-bar-fill ai-fill" id="aiMsgBar"></div>
        </div>
      </div>
    </div>
    
    <!-- Trend indicator -->
    <div class="msg-trend">
      <div class="msg-trend-chart">
        <svg class="msg-trend-svg" viewBox="0 0 200 60" preserveAspectRatio="none" id="msgTrendSvg">
          <defs>
            <linearGradient id="msgTrendGradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path class="msg-trend-area" id="msgTrendArea" fill="url(#msgTrendGradient)"/>
          <path class="msg-trend-line" id="msgTrendLine" fill="none" stroke="var(--accent)" stroke-width="2"/>
        </svg>
      </div>
      <div class="msg-trend-info">
        <div class="msg-trend-label">Monthly activity</div>
        <div class="msg-trend-value" id="msgTrendValue">
          <span class="trend-arrow">↑</span>
          <span id="msgTrendPercent">--</span>
        </div>
      </div>
    </div>
  </div>
</div>
