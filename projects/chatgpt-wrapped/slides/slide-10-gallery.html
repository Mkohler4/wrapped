<!-- Slide 10: AI Art Gallery - Your Creative Journey -->
<div class="slide" id="slide10">
  <!-- Floating image frame background -->
  <div class="gallery-frames-bg" id="galleryFramesBg">
    <!-- Generated by JS -->
  </div>
  
  <div class="gallery-content">
    <div class="slide-label">Your AI art gallery</div>
    
    <!-- Hero stat with glow -->
    <div class="gallery-hero">
      <div class="gallery-hero-number-container">
        <div class="gallery-hero-number" id="galleryHeroNumber" data-target="0">0</div>
        <div class="gallery-hero-glow"></div>
      </div>
      <div class="gallery-hero-label">images created</div>
      <div class="gallery-hero-sublabel">with ChatGPT</div>
    </div>
    
    <!-- Stats breakdown -->
    <div class="gallery-stats-row">
      <div class="gallery-stat-card" id="galleryStatGenerated">
        <div class="gallery-stat-icon">🎨</div>
        <div class="gallery-stat-value" id="galleryGeneratedCount" data-target="0">0</div>
        <div class="gallery-stat-label">AI Generated</div>
        <div class="gallery-stat-bar">
          <div class="gallery-stat-bar-fill generated-fill" id="galleryGeneratedBar"></div>
        </div>
      </div>
      
      <div class="gallery-stat-divider">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      
      <div class="gallery-stat-card" id="galleryStatUploaded">
        <div class="gallery-stat-icon">📤</div>
        <div class="gallery-stat-value" id="galleryUploadedCount" data-target="0">0</div>
        <div class="gallery-stat-label">Uploaded</div>
        <div class="gallery-stat-bar">
          <div class="gallery-stat-bar-fill uploaded-fill" id="galleryUploadedBar"></div>
        </div>
      </div>
    </div>
    
    <!-- Featured images showcase -->
    <div class="gallery-showcase" id="galleryShowcase">
      <!-- Filter tabs -->
      <div class="gallery-filter-tabs">
        <button class="gallery-filter-tab active" data-filter="all" onclick="setGalleryFilter('all')">
          All
        </button>
        <button class="gallery-filter-tab" data-filter="generated" onclick="setGalleryFilter('generated')">
          🎨 Generated
        </button>
        <button class="gallery-filter-tab" data-filter="uploaded" onclick="setGalleryFilter('uploaded')">
          📤 Uploaded
        </button>
      </div>
      
      <!-- Image grid with side arrows -->
      <div class="gallery-grid-wrapper">
        <button class="gallery-arrow gallery-arrow-left" onclick="scrollGalleryGrid(-1)" id="galleryScrollLeft">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        
        <div class="gallery-grid" id="galleryGrid">
          <!-- Filled by JS -->
        </div>
        
        <button class="gallery-arrow gallery-arrow-right" onclick="scrollGalleryGrid(1)" id="galleryScrollRight">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- No data message (hidden by default) -->
    <div class="gallery-no-data" id="galleryNoData" style="display: none;">
      <div class="gallery-no-data-icon">🖼️</div>
      <div class="gallery-no-data-text">No images yet</div>
      <div class="gallery-no-data-hint">Ask ChatGPT to generate some images for you!</div>
    </div>
  </div>
</div>
