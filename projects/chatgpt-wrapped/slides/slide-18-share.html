<!-- Slide 18: Share - Journey Complete -->
<div class="slide" id="slide18">
  <!-- Subtle celebration background -->
  <div class="share-sparkles-bg" id="shareSparklesBg">
    <!-- Generated by JS -->
  </div>
  
  <div class="share-content">
    <div class="slide-label share-label">That's a wrap!</div>
    
    <!-- Main title with glow -->
    <div class="share-title-container">
      <div class="share-title">Your ChatGPT Wrapped</div>
      <div class="share-title-glow"></div>
    </div>
    
    <!-- Quick stats summary -->
    <div class="share-summary">
      <div class="share-stat">
        <span class="share-stat-value" id="shareConvos">0</span>
        <span class="share-stat-label">conversations</span>
      </div>
      <div class="share-stat-divider"></div>
      <div class="share-stat">
        <span class="share-stat-value" id="shareMessages">0</span>
        <span class="share-stat-label">messages</span>
      </div>
    </div>
    
    <!-- Share buttons -->
    <div class="share-buttons">
      <button class="share-btn share-btn-video" onclick="openVideoModal()">
        <span class="share-btn-icon">🎬</span>
        <span>Create Video</span>
      </button>
      <button class="share-btn share-btn-primary" onclick="downloadImage()">
        <span class="share-btn-icon">📸</span>
        <span>Save Image</span>
      </button>
      <button class="share-btn" onclick="shareTwitter()">
        <span class="share-btn-icon">𝕏</span>
        <span>Share</span>
      </button>
      <button class="share-btn" onclick="restart()">
        <span class="share-btn-icon">🔄</span>
        <span>Start Over</span>
      </button>
    </div>
    
    <!-- Hashtag with subtle pulse -->
    <div class="share-hashtag">#ChatGPTWrapped</div>
  </div>
</div>
