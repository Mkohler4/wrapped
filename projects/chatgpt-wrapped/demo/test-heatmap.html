<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Test — Heatmap Wave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/heatmap.css">
  <link rel="stylesheet" href="css/stats.css">
  <style>
    /* Test harness controls */
    .test-controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .test-controls button {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #ececec;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .test-controls button:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
    }
    .test-controls button:active {
      transform: scale(0.97);
    }
    .test-controls .label {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Minimal DOM that editor.js expects -->
  <div class="viewport" id="viewport">
    <div class="editor" id="editor" style="opacity: 0;">
      <nav class="editor__sidebar" id="sidebar"></nav>
      <header class="editor__header"></header>
      <main class="editor__main"></main>
      <footer class="editor__footer"></footer>
    </div>
  </div>
  <div class="fake-cursor" id="fake-cursor" style="display:none;"></div>

  <!-- Test controls -->
  <div class="test-controls">
    <span class="label">Heatmap Test</span>
    <button id="btn-rain">Rain Only</button>
    <button id="btn-wave">Wave Only</button>
    <button id="btn-streak">Streak Only</button>
    <button id="btn-busiest">Busiest Only</button>
    <button id="btn-wave-streak">Wave + Streak</button>
    <button id="btn-all-stats">All 3 Stats</button>
    <button id="btn-launch">Launch Cell</button>
    <button id="btn-full">Rain → Stats → Launch</button>
    <button id="btn-reset">Reset</button>
  </div>

  <!-- Prevent editor.js auto-run, then load it for access to exposed functions -->
  <script>window.__editorTestMode = true;</script>
  <script src="js/config.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/state.js"></script>
  <script src="js/editor.js"></script>

  <script>
  (() => {
    'use strict';

    const wait = (ms) => new Promise(r => setTimeout(r, ms));
    const viewport = document.getElementById('viewport');

    // ---- Heatmap builder (standalone, no overlay/cube dependency) ----
    // Mirrors buildHeatmap logic but skips the cube→phantom→seed transition.
    // Builds the grid directly at scale(1) with all cells visible.

    function buildTestHeatmap() {
      // Clean previous
      const old = viewport.querySelector('.heatmap');
      if (old) old.remove();
      // Also remove any lingering stat overlays
      viewport.querySelectorAll('.heatmap-stat').forEach(el => el.remove());

      const { computeActivityData, formatNumber } = window.__editor;
      const COLS = 52, ROWS = 7, CELL_SIZE = 14, GAP = 3;
      const { levels: activityData } = computeActivityData();

      const heatmap = document.createElement('div');
      heatmap.className = 'heatmap';
      heatmap.style.opacity = '1';
      heatmap.style.transform = 'translate(-50%, -50%) scale(1.0)';

      // Grid area
      const gridArea = document.createElement('div');
      gridArea.className = 'heatmap__grid-area';

      // Day labels
      const dayLabelsEl = document.createElement('div');
      dayLabelsEl.className = 'heatmap__day-labels';
      ['', 'M', '', 'W', '', 'F', ''].forEach(name => {
        const lbl = document.createElement('div');
        lbl.className = 'heatmap__day-label';
        lbl.textContent = name;
        lbl.style.opacity = '1';
        dayLabelsEl.appendChild(lbl);
      });
      gridArea.appendChild(dayLabelsEl);

      // Grid
      const grid = document.createElement('div');
      grid.className = 'heatmap__grid';

      const allCells = [];
      for (let col = 0; col < COLS; col++) {
        const colEl = document.createElement('div');
        colEl.className = 'heatmap__col';
        for (let row = 0; row < ROWS; row++) {
          const cell = document.createElement('div');
          const level = activityData[col][row];
          cell.className = `heatmap__cell heatmap__cell--level-${level}`;
          colEl.appendChild(cell);
          allCells.push({ el: cell, col, row, dist: 0, delay: 0, fallDuration: 0, isSeed: false });
        }
        grid.appendChild(colEl);
      }
      gridArea.appendChild(grid);
      heatmap.appendChild(gridArea);

      // Month labels
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const monthRow = document.createElement('div');
      monthRow.className = 'heatmap__month-labels';
      const colPx = CELL_SIZE + GAP;
      const weeksPerMonth = COLS / 12;
      MONTHS.forEach(name => {
        const lbl = document.createElement('div');
        lbl.className = 'heatmap__month-label';
        lbl.textContent = name;
        lbl.style.width = `${Math.round(weeksPerMonth * colPx)}px`;
        lbl.style.opacity = '1';
        monthRow.appendChild(lbl);
      });
      heatmap.appendChild(monthRow);

      viewport.appendChild(heatmap);

      return { heatmap, grid, allCells, activityData, COLS, ROWS };
    }

    // ---- Rain animation (standalone) ----
    // Starts all cells above viewport, then drops them with staggered delays.
    async function testRain(refs) {
      const { allCells, grid, COLS, ROWS } = refs;
      const centerCol = Math.floor(COLS / 2);
      const centerRow = Math.floor(ROWS / 2);

      // Hide cells above
      allCells.forEach(c => {
        const offset = -(300 + Math.random() * 500);
        c.el.style.transition = 'none';
        c.el.style.transform = `translateY(${offset}px)`;
        c.el.style.willChange = 'transform';

        const dx = c.col - centerCol;
        const dy = c.row - centerRow;
        c.dist = Math.sqrt(dx * dx + dy * dy);
        const baseDelay = c.dist * 25;
        const jit = (Math.random() * 300) - 150;
        c.delay = Math.max(0, Math.min(3500, baseDelay + jit));
        c.fallDuration = 400 + Math.random() * 200;
      });

      // Start at scale 2.2
      refs.heatmap.style.transition = 'none';
      refs.heatmap.style.transform = 'translate(-50%, -50%) scale(2.2)';
      grid.offsetHeight;

      // Set transitions and trigger fall
      allCells.forEach(c => {
        c.el.style.transition =
          `transform ${c.fallDuration}ms cubic-bezier(0.34, 1.56, 0.64, 1) ${c.delay}ms`;
      });
      grid.offsetHeight;
      allCells.forEach(c => {
        c.el.style.transform = 'translateY(0)';
      });

      // Zoom out mid-rain
      await wait(1200);
      refs.heatmap.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.15, 1)';
      refs.heatmap.style.transform = 'translate(-50%, -50%) scale(1.0)';

      const maxDelay = Math.max(...allCells.map(c => c.delay));
      const remaining = Math.max(0, (maxDelay + 600) - 1200);
      await wait(remaining + 100);

      // GPU cleanup
      allCells.forEach(c => {
        c.el.style.willChange = 'auto';
        c.el.style.transition = 'none';
      });
    }

    // ---- Button handlers ----
    let currentRefs = null;

    function reset() {
      currentRefs = buildTestHeatmap();
    }

    document.getElementById('btn-reset').addEventListener('click', reset);

    document.getElementById('btn-rain').addEventListener('click', async () => {
      currentRefs = buildTestHeatmap();
      await testRain(currentRefs);
    });

    // Helper: clean all heatmap state classes
    function cleanCellStates(refs) {
      refs.heatmap.querySelectorAll('.heatmap-stat').forEach(el => el.remove());
      refs.allCells.forEach(c => {
        c.el.classList.remove(
          'heatmap__cell--dimmed',
          'heatmap__cell--faded',
          'heatmap__cell--busiest'
        );
        c.el.style.transform = '';
      });
    }

    document.getElementById('btn-wave').addEventListener('click', async () => {
      if (!currentRefs) currentRefs = buildTestHeatmap();
      cleanCellStates(currentRefs);
      await window.__editor.revealActiveDays(currentRefs);
    });

    document.getElementById('btn-streak').addEventListener('click', async () => {
      if (!currentRefs) currentRefs = buildTestHeatmap();
      cleanCellStates(currentRefs);
      // Simulate post-active-days state: dim inactive cells
      currentRefs.allCells.forEach(c => {
        if (currentRefs.activityData[c.col][c.row] === 0) {
          c.el.classList.add('heatmap__cell--dimmed');
        }
      });
      // Fake a previous stat for the recede effect
      const fakePrev = { stat: null };
      await window.__editor.revealLongestStreak(currentRefs, fakePrev);
    });

    document.getElementById('btn-busiest').addEventListener('click', async () => {
      if (!currentRefs) currentRefs = buildTestHeatmap();
      cleanCellStates(currentRefs);
      // Simulate post-streak state: dim inactive, fade non-streak
      currentRefs.allCells.forEach(c => {
        if (currentRefs.activityData[c.col][c.row] === 0) {
          c.el.classList.add('heatmap__cell--dimmed');
        }
      });
      // Run streak first to get streakCells, then busiest day
      const fakePrev = { stat: null };
      const streakResult = await window.__editor.revealLongestStreak(currentRefs, fakePrev);
      await window.__editor.revealBusiestDay(currentRefs, {
        activeDays: { stat: null },
        streak: streakResult,
      });
    });

    document.getElementById('btn-wave-streak').addEventListener('click', async () => {
      if (!currentRefs) currentRefs = buildTestHeatmap();
      cleanCellStates(currentRefs);
      const adResult = await window.__editor.revealActiveDays(currentRefs);
      await window.__editor.revealLongestStreak(currentRefs, adResult);
    });

    document.getElementById('btn-all-stats').addEventListener('click', async () => {
      if (!currentRefs) currentRefs = buildTestHeatmap();
      cleanCellStates(currentRefs);
      const adResult = await window.__editor.revealActiveDays(currentRefs);
      const streakResult = await window.__editor.revealLongestStreak(currentRefs, adResult);
      await window.__editor.revealBusiestDay(currentRefs, {
        activeDays: adResult,
        streak: streakResult,
      });
    });

    document.getElementById('btn-launch').addEventListener('click', async () => {
      if (!currentRefs) currentRefs = buildTestHeatmap();
      cleanCellStates(currentRefs);
      const adResult = await window.__editor.revealActiveDays(currentRefs);
      const streakResult = await window.__editor.revealLongestStreak(currentRefs, adResult);
      const busiestResult = await window.__editor.revealBusiestDay(currentRefs, {
        activeDays: adResult,
        streak: streakResult,
      });
      await window.__editor.launchBusiestCell(currentRefs, busiestResult);
      currentRefs = null; // heatmap was removed
    });

    document.getElementById('btn-full').addEventListener('click', async () => {
      currentRefs = buildTestHeatmap();
      await testRain(currentRefs);
      await wait(800);
      const adResult = await window.__editor.revealActiveDays(currentRefs);
      const streakResult = await window.__editor.revealLongestStreak(currentRefs, adResult);
      const busiestResult = await window.__editor.revealBusiestDay(currentRefs, {
        activeDays: adResult,
        streak: streakResult,
      });
      await window.__editor.launchBusiestCell(currentRefs, busiestResult);
      currentRefs = null; // heatmap was removed
    });

    // Auto-build on load so there's something to see
    reset();
  })();
  </script>
</body>
</html>
