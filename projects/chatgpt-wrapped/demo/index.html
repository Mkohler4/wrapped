<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ChatGPT Wrapped 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/cascade.css">
  <link rel="stylesheet" href="css/cascade-v2.css">
  <link rel="stylesheet" href="css/stats.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/topics.css">
  <link rel="stylesheet" href="css/line-graph.css">
  <link rel="stylesheet" href="css/heatmap.css">
  <link rel="stylesheet" href="css/dot-draw.css">
  <link rel="stylesheet" href="css/word-bubbles.css">
  <link rel="stylesheet" href="css/image-unfold.css">
  <link rel="stylesheet" href="css/award-room.css">
</head>
<body>

  <!-- Viewport clip — hides overflow when the editor scales up -->
  <div class="viewport" id="viewport">

    <!-- The entire editor — this is what gets scaled/translated on zoom -->
    <div class="editor" id="editor">

      <!-- Sidebar — slides in from left -->
      <nav class="editor__sidebar" id="sidebar">
        <div class="sidebar__header">
          <button class="sidebar__new-chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New chat
          </button>
        </div>
        <div class="sidebar__list" id="sidebar-list">
          <!-- Conversation items injected by JS -->
        </div>
      </nav>

      <!-- Header -->
      <header class="editor__header">
        <div class="editor__header-left">
          <button class="editor__sidebar-btn" aria-label="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
          <span class="editor__header-model">ChatGPT <span class="editor__header-caret">▾</span></span>
        </div>
        <div class="editor__header-right">
          <button class="editor__icon-btn" aria-label="New chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main chat area -->
      <main class="editor__main">
        <div class="editor__welcome">
          <div class="editor__welcome-icon">✦</div>
          <h1 class="editor__welcome-title">What can I help with?</h1>
        </div>
      </main>

      <!-- Footer with input -->
      <footer class="editor__footer">
        <div class="editor__input-wrap" id="input-wrap">
          <div class="editor__input" id="input-field">
            <span class="editor__input-text" id="input-text"></span>
            <span class="editor__cursor" id="cursor"></span>
            <span class="editor__placeholder" id="placeholder">Message ChatGPT...</span>
          </div>
          <div class="editor__input-actions">
            <button class="editor__attach-btn" aria-label="Images">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
            </button>
            <button class="editor__send-btn" id="send-btn" aria-label="Send">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 14V2M8 2L3 7M8 2L13 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <p class="editor__disclaimer">ChatGPT can make mistakes. Check important info.</p>
      </footer>

    </div>
  </div>

  <!-- Fake mouse cursor -->
  <div class="fake-cursor" id="fake-cursor">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 2L3 16L7.5 11.5L12.5 18L15 16.5L10 10L16 9L3 2Z" fill="white" stroke="black" stroke-width="1"/>
    </svg>
  </div>

  <script src="js/image-unfold.js"></script>
  <script src="js/config.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/state.js"></script>
  <script src="js/phases/01-type-prompt.js"></script>
  <script src="js/phases/02-move-cursor-to-send.js"></script>
  <script src="js/phases/03-click-send.js"></script>
  <script src="js/phases/04-send-message.js"></script>
  <script src="js/phases/05-thinking-dots.js"></script>
  <script src="js/phases/06-stream-ai-response.js"></script>
  <script src="js/phases/07-highlight-response.js"></script>
  <script src="js/phases/07n-dot-draws-graph.js"></script>
  <script src="js/phases/08-cascade-messages-v2.js"></script>
  <script src="js/phases/09-compress-blur.js"></script>
  <script src="js/phases/10-hero-stat.js"></script>
  <script src="js/phases/10b-morph-conversations.js"></script>
  <script src="js/phases/11-transition-sidebar-v2.js"></script>
  <script src="js/phases/13-open-sidebar.js"></script>
  <script src="js/phases/14-group-conversations.js"></script>
  <script src="js/phases/15-collapse-bar-chart.js"></script>
  <script src="js/phases/16-cursor-to-input.js"></script>
  <script src="js/phases/17-growth-insight.js"></script>
  <script src="js/phases/18-unwrite-restream.js"></script>
  <script src="js/phases/19-graph-transitions.js"></script>
  <script src="js/phases/20-deconstruct-bar.js"></script>
  <script src="js/phases/21-heatmap.js"></script>
  <script src="js/phases/22-active-days.js"></script>
  <script src="js/phases/23-longest-streak.js"></script>
  <script src="js/phases/24-busiest-day.js"></script>
  <script src="js/phases/25-launch-cell.js"></script>
  <script src="js/phases/26-word-bubbles.js"></script>
  <script src="js/phases/27-cursor-to-image.js"></script>
  <script src="js/phases/28-drag-image.js"></script>
  <script src="js/phases/29-award-room.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
